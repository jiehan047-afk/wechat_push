# 默认配置文件
# 可以通过spring.profiles.active切换不同环境
spring:
  profiles:
    active: prod

# 通用配置
server:
  port: 8080

# SpringDoc OpenAPI配置
springdoc:
  # 启用springdoc的API文档端点
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
  # 禁用泛型响应处理，避免ControllerAdviceBean构造函数问题
  override-with-generic-response: false

jwt:
  secret: k7J8x9Y2zA1B3C4D5E6F7G8H9I0J1K2L3M4N5O6P7Q8R9S0T1U2V3W=
  expiration: 86400000  # 24小时，单位毫秒

